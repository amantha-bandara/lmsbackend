{% extends 'base.html' %}

{%block content%}

<!DOCTYPE html>
  <head>
      <title>LMS</title>
      <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons"
      rel="stylesheet">
      <link rel="stylesheet" href="style.css">
      <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
    <style>
        img{
        border-radius: 50%;
    }#heading{
        color: green;
    }
    </style>
    <script>
        $(document).ready(function(){
          $(("#btn")).click(function(){
            alert("Are you sure to delete");
          });
        });
        $(document).ready(function(){
          $(("#bn")).click(function(){
            alert("Confirm");
          });
        });
    </script>
</head>
<body>
    <div class="container">
        
        <h5>Profile</h5>
        <hr>
        <div class="container text-center">
            <div class="row">
              <div class="col">
                <img src="static/student.jpeg" width="250px" height="250px">
              </div>
                <div class="col">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingInput" placeholder="" value="{{current_user.first_name}}">
                        <label for="floatingInput">First name</label>
                      </div>
                      <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingInput" placeholder="" value="{{current_user.last_name}}">
                        <label for="floatingInput">Last name</label>
                      </div>
                      <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingInput" placeholder="" value="{{current_user.grade}}">
                        <label for="floatingInput">Grade</label>
                      </div>
                      <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingInput" placeholder="" value="{{current_user.NIC}}">
                        <label for="floatingInput">NIC number</label>
                      </div>
                      <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingInput" placeholder="" value="{{current_user.t_no}}">
                        <label for="floatingInput">telephone number</label>
                      </div>
                      <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingInput" placeholder="" value="{{current_user.email}}">
                        <label for="floatingInput">Email</label>
                      </div>
                      <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="floatingInput" placeholder="" value="{{current_user.password}}">
                        <label for="floatingInput">Password(ignore this line.enter your new password)</label>
                      </div>
                     
                      <div class="input-group mb-3">
                        <label class="input-group-text" for="inputGroupFile01">Picture</label>
                        <input type="file" name="reciept" class="form-control" id="inputGroupFile01">
                      </div>

                      <a href="/backtoprofile" type="button" class="btn btn-outline-primary">Back</a>
                      <button type="button" id="bn" class="btn btn-success">Go</button>
                      
              </div>
            </div>
        </div>
        <footer class="py-3 my-4">
            <hr>
            <p class="text-center text-body-secondary">&copy; 2024 Company, Inc</p>
        </footer>
    </div>
</body>
</html>
{%endblock%}
